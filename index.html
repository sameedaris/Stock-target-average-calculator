<!DOCTYPE html>
<html>
<head>
  <title>Two-Way Stock Average Calculator</title>
  <style>
    body {
      font-family: Arial;
      max-width: 650px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f4f4;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 15px;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 6px;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Two-Way Stock Average Calculator</h2>

<div class="box">
  <label>Existing Shares</label>
  <input id="q1" type="number" value="7000" oninput="calc()">

  <label>Existing Avg Price</label>
  <input id="p1" type="number" value="54.05" oninput="calc()">

  <label>New Quantity</label>
  <input id="q2" type="number" value="7000" oninput="calc()">

  

  <label>New Buy Price</label>
  <input id="p2" type="number" value="30" oninput="calcPriceChanged()">
<label>Final Average Price</label>
  <input id="target" type="number" value="41" oninput="calcTargetChanged()">
</div>

<div class="box">
  <div class="result" id="result"></div>
</div>

<script>

function calcBase(q1, p1, q2, p2) {
    let totalShares = q1 + q2;
    return ((q1 * p1) + (q2 * p2)) / totalShares;
}

// When TARGET changes → calculate PRICE
function calcTargetChanged() {
    let q1 = parseFloat(document.getElementById("q1").value) || 0;
    let p1 = parseFloat(document.getElementById("p1").value) || 0;
    let q2 = parseFloat(document.getElementById("q2").value) || 0;
    let t  = parseFloat(document.getElementById("target").value) || 0;

    if (q2 === 0) return;

    let p2 = ((t * (q1 + q2)) - (q1 * p1)) / q2;

    document.getElementById("p2").value = p2.toFixed(2);

    showResult(q1, p1, q2, p2);
}

// When PRICE changes → calculate TARGET
function calcPriceChanged() {
    let q1 = parseFloat(document.getElementById("q1").value) || 0;
    let p1 = parseFloat(document.getElementById("p1").value) || 0;
    let q2 = parseFloat(document.getElementById("q2").value) || 0;
    let p2 = parseFloat(document.getElementById("p2").value) || 0;

    let avg = calcBase(q1, p1, q2, p2);

    document.getElementById("target").value = avg.toFixed(2);

    showResult(q1, p1, q2, p2);
}

// Default sync
function calc() {
    calcTargetChanged();
}

// Show result
function showResult(q1, p1, q2, p2) {
    let avg = calcBase(q1, p1, q2, p2);

    document.getElementById("result").innerHTML =
        "Final Average Price: <b>" + avg.toFixed(2) + "</b>";
}

// initial run
calc();

</script>

</body>
</html>
